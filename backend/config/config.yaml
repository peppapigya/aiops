# DevOps Console 配置文件
# 支持 ${ENV_NAME:默认值} 占位符，也支持 DEVOPS_ 前缀环境变量覆盖。
# 例如: DEVOPS_DATABASE_MYSQL_HOST、DB_HOST、DB_PASSWORD

# 服务配置
server:
  port: "${SERVER_PORT::8081}"
  log_level: "${LOG_LEVEL:info}"  # debug, info, warn, error

# 数据库配置
database:
  type: "${DATABASE_TYPE:mysql}"  # 仅支持MySQL

  # MySQL配置
  mysql:
    host: "${DB_HOST:mysql}"
    port: "${DB_PORT:3306}"
    username: "${DB_USER:devops}"
    password: "${DB_PASSWORD:devops123456}"
    database: "${DB_NAME:devops_console}"
    charset: "${DB_CHARSET:utf8mb4}"
    parse_time: "${DB_PARSE_TIME:true}"
    max_open_conns: "${DB_MAX_OPEN_CONNS:10}"
    max_idle_conns: "${DB_MAX_IDLE_CONNS:5}"

# 日志配置
logging:
  format: "${LOGGING_FORMAT:json}"  # json, text
  time_format: "${LOGGING_TIME_FORMAT:2006-01-02 15:04:05}"
  report_caller: "${LOGGING_REPORT_CALLER:true}"

# 应用配置
app:
  name: "${APP_NAME:AiOps}"
  version: "${APP_VERSION:1.0.0}"
  environment: "${APP_ENVIRONMENT:development}"  # development, production

# Elasticsearch配置
elasticsearch:
  timeout: "${ELASTICSEARCH_TIMEOUT:30}"  # 连接超时时间（秒）
  retry: "${ELASTICSEARCH_RETRY:3}"    # 重试次数
  health_check_interval: "${ELASTICSEARCH_HEALTH_CHECK_INTERVAL:60}"  # 健康检查间隔（秒）

# Kubernetes配置
kubernetes:
  config_path: "${KUBERNETES_CONFIG_PATH:}"  # kubeconfig文件路径，为空时使用集群内配置
  timeout: "${KUBERNETES_TIMEOUT:30}"      # 操作超时时间（秒）
  retry: "${KUBERNETES_RETRY:3}"         # 重试次数

# Swagger配置
swagger:
  enabled: "${SWAGGER_ENABLED:true}"
  host: "${SWAGGER_HOST:localhost:8081}"
  base_path: "${SWAGGER_BASE_PATH:/}"

# 健康检查配置
health:
  enabled: "${HEALTH_ENABLED:true}"
  endpoint: "${HEALTH_ENDPOINT:/health}"
  interval: "${HEALTH_INTERVAL:30}"  # 检查间隔（秒）

redis:
  host: "${REDIS_HOST:redis}"
  port: "${REDIS_PORT:6379}"
  password: "${REDIS_PASSWORD:}"
  db: "${REDIS_DB:0}"

ai:
  mcp:
    enabled: "${AI_MCP_ENABLED:true}"
    url: "${AI_MCP_URL:http://127.0.0.1:8080}"
    token: "${AI_MCP_TOKEN:}" # apikey
    max_retries: "${AI_MCP_MAX_RETRIES:3}"

jwt:
  secret: "${JWT_SECRET:n02y2Zqf4eL0hZ4xjQH9w1zDk1w5FqMnc9R+N8T1v2E=}"
  expire-time: "${JWT_EXPIRE_TIME:3600}" # 单位为秒
  refresh-expire-time: "${JWT_REFRESH_EXPIRE_TIME:604800}"
  exclude-paths:
    - /api/v1/system/login
    - /api/v1/sysUser/refresh
    - /api/v1/sysUser/captcha
    - /swagger/*
    - /jobs/script/
    - /metrics
    - /ws/*
    - /health

# 加密配置 (用于敏感数据如主机密码等)
encryption:
  key: "${ENCRYPTION_KEY:So722DGlBzRASCG9so/Knfuy81cdhQ7gArgZjcJHvpQ=}"

feishu:
  webhook: "${FEISHU_WEBHOOK:}" # 飞书 webhook地址
  secret: "${FEISHU_SECRET:}" # 飞书 secret
  appId: "${FEISHU_APP_ID:}" # 飞书 appId 机器人签名校验可能用
  appSecret: "${FEISHU_APP_SECRET:}" # 飞书 appSecret 调用飞书开放平台 API 才用
  enabled: "${FEISHU_ENABLED:false}" # 是否开启该功能
