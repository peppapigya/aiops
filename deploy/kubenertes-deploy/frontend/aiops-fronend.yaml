apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-frontend
  labels:
    app: frontend
    component: aiops
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      component: aiops
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      name: frontend
      labels:
        app: frontend
        component: aiops
    spec:
      containers:
      - name: frontend
        image: aiops-frontend:latest
        ports:
        - name: web
          containerPort: 80
        volumeMounts:
        - name: conf-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf 
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
        - name: conf-volume
          configMap:
            name: nginx-conf
